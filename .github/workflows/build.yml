name: Build Oryn iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Fix any remaining version mismatches
        run: npx expo install --fix || true

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          node -e "
            const fs = require('fs');
            const buf = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==', 'base64');
            ['icon','splash','adaptive-icon','notification-icon'].forEach(n => {
              if (!fs.existsSync('assets/' + n + '.png')) {
                fs.writeFileSync('assets/' + n + '.png', buf);
              }
            });
            console.log('Assets ready');
          "

      - name: Build iOS simulator with EAS
        run: |
          export EAS_NO_VCS=1
          eas build --platform ios --profile simulator --non-interactive --wait 2>&1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download build artifact
        if: success()
        run: |
          export EAS_NO_VCS=1
          BUILD_URL=$(eas build:list --platform ios --limit 1 --json --non-interactive 2>/dev/null | node -e "
            let d=''; process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const b=JSON.parse(d);
                console.log(b[0]?.artifacts?.buildUrl||'');
              } catch(e){ console.log(''); }
            });
          ")
          echo "Build URL: $BUILD_URL"
          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o oryn-ios.tar.gz
            ls -lh oryn-ios.tar.gz
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oryn-ios-build
          path: oryn-ios.tar.gz
          if-no-files-found: warn
          retention-days: 7
