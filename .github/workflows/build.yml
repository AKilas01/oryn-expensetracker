name: Build Oryn iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          node -e "
            const fs = require('fs');
            const buf = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==', 'base64');
            ['icon','splash','adaptive-icon','notification-icon'].forEach(n => {
              if (!fs.existsSync('assets/' + n + '.png')) {
                fs.writeFileSync('assets/' + n + '.png', buf);
                console.log('Created assets/' + n + '.png');
              }
            });
          "

      - name: Build iOS with EAS (no credentials needed)
        run: |
          export EAS_NO_VCS=1
          eas build --platform ios --profile simulator --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for build and get URL
        run: |
          export EAS_NO_VCS=1
          echo "Build submitted to EAS. Waiting for completion..."
          # Wait up to 20 minutes for build
          for i in {1..40}; do
            sleep 30
            STATUS=$(eas build:list --platform ios --limit 1 --json --non-interactive 2>/dev/null | node -e "
              let d=''; process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try { const b=JSON.parse(d); console.log(b[0]?.status||'unknown'); }
                catch(e){ console.log('unknown'); }
              });
            ")
            echo "Build status: $STATUS (check $i/40)"
            if [ "$STATUS" = "FINISHED" ]; then
              echo "Build complete!"
              break
            fi
            if [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
          done

          # Download the build
          BUILD_URL=$(eas build:list --platform ios --limit 1 --json --non-interactive 2>/dev/null | node -e "
            let d=''; process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const b=JSON.parse(d);
                console.log(b[0]?.artifacts?.buildUrl||'');
              } catch(e){ console.log(''); }
            });
          ")
          echo "Build URL: $BUILD_URL"
          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o oryn-app.tar.gz || curl -L "$BUILD_URL" -o oryn.ipa
            echo "Downloaded successfully"
            ls -la oryn* 2>/dev/null || echo "No file found"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: oryn-ios-build
          path: |
            oryn.ipa
            oryn-app.tar.gz
          if-no-files-found: warn
          retention-days: 7
