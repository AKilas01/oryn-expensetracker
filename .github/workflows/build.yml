name: Build Oryn iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          node -e "
            const fs = require('fs');
            const buf = Buffer.from('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==', 'base64');
            ['icon','splash','adaptive-icon','notification-icon'].forEach(n => {
              if (!fs.existsSync('assets/' + n + '.png')) {
                fs.writeFileSync('assets/' + n + '.png', buf);
                console.log('Created assets/' + n + '.png');
              }
            });
          "

      - name: Build iOS IPA with EAS
        run: |
          export EAS_NO_VCS=1
          eas build --platform ios --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download IPA
        run: |
          BUILD_URL=$(eas build:list --platform ios --limit 1 --json --non-interactive | node -e "
            let data = '';
            process.stdin.on('data', d => data += d);
            process.stdin.on('end', () => {
              try {
                const builds = JSON.parse(data);
                console.log(builds[0]?.artifacts?.buildUrl || '');
              } catch(e) { console.log(''); }
            });
          ")
          echo "Build URL: $BUILD_URL"
          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o oryn.ipa
            echo "Downloaded IPA successfully"
          else
            echo "No build URL found, checking EAS dashboard manually"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: oryn-ios
          path: oryn.ipa
          if-no-files-found: warn
          retention-days: 7
